<head>
  <meta charset="UTF-8">
  <style>
    .terminee {
      color:gray;
      text-decoration: line-through;
    }
  </style>
</head>

<div id="app">
  <h1>{{ titre }} </h1>
    <ul>
        <li v-for ="el in liste"> 
            <input type="checkbox" class = terminee v-model ="checked" >
            <label for="el">{{ el }}</label>
         </li>
         

    </ul>


</div>
<script type="module">
  import { createApp } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
  createApp({
    data() {
      return {
        titre: "Liste",
        liste : ["faire course", "réviser", "devoirs"]
      }
    }



  }).mount('#app')
</script>
