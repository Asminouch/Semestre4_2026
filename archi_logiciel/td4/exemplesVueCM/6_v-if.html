 <div id="app">
	<p v-if="estVisible">{{reponse}}</p>
	<p v-else>La solution est cachée</p>

	<button @click="estVisible = !estVisible">
	Afficher / Masquer le message
	</button>
  </div>
<script type="module">
    import { createApp } from
  	"https://unpkg.com/vue@3/dist/vue.esm-browser.js" 
    createApp({
      data() {
        return {
		reponse : "voici la solution",
		estVisible: false
        }
      }
      }
    ).mount('#app')
</script>
