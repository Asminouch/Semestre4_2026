<div id="app" class="container">
  <ul>
    <li v-for="item in items">
		{{ item }}
    </li>
  </ul>
</div>
<script type="module">
  import { createApp }  from
  	"https://unpkg.com/vue@3/dist/vue.esm-browser.js" 
  createApp({
    data() {
      return {
        items: ["orange","pomme","fraise"],
      }
    }
  }).mount('#app')
</script>
