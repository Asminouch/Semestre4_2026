<div id="app">
  <span v-bind:title="message">
    Survolez moi pour observer mon titre dynamiquement chargé !
  </span>
</div>
</body>
</html>
<script type="module">
  import { createApp } from
  	"https://unpkg.com/vue@3/dist/vue.esm-browser.js"
  createApp({
    data() {
      return {
        message: 'Cette page a été chargée le ' + new Date()
      }
    }
  }).mount('#app')
</script>
